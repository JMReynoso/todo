<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>todo — daily, weekly, monthly, quarterly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Comfortaa:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #faf8f5;
        --bg-elev: #ffffff;
        --bg-sunken: #f3efe8;
        --ink: #1a1612;
        --ink-2: #4a4439;
        --ink-3: #8a8275;
        --ink-4: #b8b0a1;
        --line: #ebe6dd;
        --line-strong: #ddd5c6;
        --accent: oklch(0.62 0.14 55);
        --accent-soft: oklch(0.94 0.04 65);
        --accent-ink: oklch(0.42 0.12 50);
        --danger: oklch(0.55 0.18 25);
        --serif: "Instrument Serif", "Times New Roman", serif;
        --sans: "Geist", ui-sans-serif, system-ui, sans-serif;
        --mono: "Geist Mono", ui-monospace, monospace;
        --display: "Comfortaa", ui-rounded, sans-serif;
        --radius: 10px;
        --row-h: 52px;
        --gutter: 28px;
      }
      [data-density="compact"] {
        --row-h: 40px;
        --gutter: 20px;
      }
      @media (max-width: 720px) {
        :root {
          --row-h: 48px;
          --gutter: 16px;
        }
        body { font-size: 14px; }
      }
      [data-mobile="true"] .topbar-spacer { display: none !important; }
      * {
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 14.5px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
      }
      ::selection {
        background: var(--accent-soft);
      }
      button {
        font: inherit;
        color: inherit;
        background: none;
        border: 0;
        cursor: pointer;
        padding: 0;
      }
      input,
      textarea {
        font: inherit;
        color: inherit;
        background: none;
        border: 0;
        outline: 0;
      }
      input::placeholder,
      textarea::placeholder {
        color: var(--ink-4);
      }
    </style>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <script>
      window.__TWEAK_DEFAULTS__ = /*EDITMODE-BEGIN*/{
        "layout": "stacked",
        "accent": "#c97a3c",
        "density": "comfortable",
        "showHairlines": true
      }/*EDITMODE-END*/;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="tweaks-panel.jsx"></script>
    <script type="text/babel" src="app.jsx"></script>
  </body>
</html>
