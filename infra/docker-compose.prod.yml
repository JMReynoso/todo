services:
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.prod
      # NEXT_PUBLIC_ vars are embedded at build time. Pass the public-facing API
      # URL here once API routes exist, e.g.:
      # args:
      #   NEXT_PUBLIC_API_URL: https://yourdomain.com/api
    ports:
      - "3100:3000"
    restart: unless-stopped
    depends_on:
      - api

  # Frontend-only public demo, built from the same source with the demo flag.
  # Runs entirely in the browser against an in-browser mock (see app/_lib/demo)
  # — no API, database, or auth — so it has no service dependencies.
  web-demo:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_DEMO: "true"
    ports:
      - "3101:3000"
    restart: unless-stopped

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.prod
    ports:
      - "5091:5091"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5091
      ConnectionStrings__Postgres: "Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      # Consumed only by `dotnet api.dll --seed`; ignored on normal boot.
      Seed__Admin1Name: ${SEED_ADMIN1_NAME}
      Seed__Admin1Initials: ${SEED_ADMIN1_INITIALS}
      Seed__Admin1Color: ${SEED_ADMIN1_COLOR}
      Seed__Admin1Email: ${SEED_ADMIN1_EMAIL}
      Seed__Admin1Password: ${SEED_ADMIN1_PASSWORD}
      Seed__Admin2Name: ${SEED_ADMIN2_NAME}
      Seed__Admin2Initials: ${SEED_ADMIN2_INITIALS}
      Seed__Admin2Color: ${SEED_ADMIN2_COLOR}
      Seed__Admin2Email: ${SEED_ADMIN2_EMAIL}
      Seed__Admin2Password: ${SEED_ADMIN2_PASSWORD}
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
